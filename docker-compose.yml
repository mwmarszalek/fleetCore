services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fleetcore-postgres
    environment:
      POSTGRES_USER: fleetcore
      POSTGRES_PASSWORD: fleetcore
      POSTGRES_DB: fleetcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fleetcore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
